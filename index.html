<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#090D1A" />
    <meta name="description" content="Glass Skin Protocol — 365 dias de ritual de skincare com IA" />

    <!-- PWA iPhone / iPad -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Glass Skin" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Ícone para iPhone (gera automaticamente via manifest) -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Splash screen cores iPhone -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <!-- Fontes Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />

    <title>Glass Skin Protocol ✦</title>

    <style>
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      body { margin: 0; background: #090D1A; overscroll-behavior: none; }
      /* Evita bounce no iPhone */
      html, body { height: 100%; overflow: hidden; }
      #root { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
      /* Safe area para iPhone com notch */
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body>

    <div id="root"></div>
